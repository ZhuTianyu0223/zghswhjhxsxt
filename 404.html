<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色印记·时空重构 — 中国红色文化交互叙事系统</title>
    <script src="./js/echarts.min.js"></script>
    <script src="./js/china.js"></script>
    <style>
        /* ==================== CSS Reset & Base ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red-deep: #8B0000;
            --red-primary: #C41E3A;
            --red-light: #E8443A;
            --gold-dark: #B8860B;
            --gold-primary: #DAA520;
            --gold-light: #FFD700;
            --ink-dark: #2C2C2C;
            --ink-medium: #4A4A4A;
            --ink-light: #6A6A6A;
            --ink-lighter: #9A9A9A;
            --paper-bg: #FFF8F0;
            --paper-light: #FFFAF5;
            --text-dark: #1A1A1A;
            --text-light: #2C2C2C;
            --shadow-red: rgba(196, 30, 58, 0.3);
            --shadow-gold: rgba(218, 165, 32, 0.4);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'KaiTi', '楷体', 'STKaiti', 'SimKai', '宋体', 'SimSun', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(180deg, #FFFEF8 0%, #FFF8F0 30%, #FFFAF5 70%, #FFFDF8 100%);
            color: var(--text-dark);
            overflow-x: hidden;
            line-height: 1.8;
        }

        /* ==================== Loading Screen ==================== */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #FFFEF8 0%, #FFF8F0 30%, #FFFAF5 70%, #FFFDF8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .loading-star {
            width: 80px; height: 80px;
            position: relative;
            animation: pulse-star 1.5s ease-in-out infinite;
        }
        .loading-star::before {
            content: '★';
            font-size: 81px;
            color: var(--red-light);
            filter: drop-shadow(0 0 30px var(--red-primary)) drop-shadow(0 0 60px var(--red-deep));
        }
        @keyframes pulse-star {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }
        .loading-text {
            margin-top: 25px;
            font-size: 25px;
            color: var(--gold-light);
            letter-spacing: 6px;
            font-weight: bold;
            text-shadow: 0 0 15px var(--gold-primary);
        }

        /* ==================== Navigation ==================== */
        nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 1000;
            padding: 0 40px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(196, 30, 58, 0.95) 0%, rgba(232, 68, 58, 0.95) 50%, rgba(196, 30, 58, 0.95) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(218, 165, 32, 0.6);
            box-shadow: 0 4px 20px rgba(196, 30, 58, 0.3);
            transition: all 0.3s ease;
        }
        nav.scrolled {
            background: linear-gradient(90deg, rgba(196, 30, 58, 0.98) 0%, rgba(232, 68, 58, 0.98) 50%, rgba(196, 30, 58, 0.98) 100%);
            box-shadow: 0 6px 30px rgba(196, 30, 58, 0.4);
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }
        .nav-brand .star-icon {
            font-size: 37px;
            color: var(--red-light);
            filter: drop-shadow(0 0 12px var(--red-primary)) drop-shadow(0 0 24px var(--red-deep));
        }
        .nav-brand .brand-text {
            font-size: 25px;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--gold-primary);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
            list-style: none;
        }
        .nav-links a {
            color: #FFF;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-links a:hover {
            color: var(--gold-light);
            background: rgba(255, 255, 255, 0.2);
        }
        .nav-links a.active {
            color: var(--gold-light);
            background: rgba(255, 255, 255, 0.2);
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 2px; left: 50%;
            width: 0; height: 2px;
            background: var(--gold-primary);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .nav-links a:hover::after { width: 60%; }

        /* Mobile nav toggle */
        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
        }
        .nav-toggle span {
            width: 24px; height: 2px;
            background: var(--gold-primary);
            transition: all 0.3s ease;
        }

        /* ==================== Hero Section ==================== */
        #hero {
            position: relative;
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(196, 30, 58, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(218, 165, 32, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(196, 30, 58, 0.1) 0%, transparent 60%),
                linear-gradient(180deg, #FFFEF8 0%, #FFF8F0 50%, #FFFAF5 100%);
        }
        /* Animated particles */
        .hero-particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--gold-light);
            border-radius: 50%;
            opacity: 0;
            animation: float-particle linear infinite;
            box-shadow: 0 0 8px var(--gold-primary);
        }
        @keyframes float-particle {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.9; }
            90% { opacity: 0.4; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
        }
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 20px;
            max-width: 900px;
        }
        .hero-subtitle {
            font-size: 19px;
            color: var(--red-primary);
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.3s forwards;
        }
        .hero-title {
            font-size: 65px;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: 8px;
            margin-bottom: 15px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }
        .hero-title .highlight {
            color: var(--red-primary);
            position: relative;
        }
        .hero-title .highlight::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--red-primary), var(--gold-primary));
            border-radius: 2px;
        }
        .hero-desc {
            font-size: 18px;
            color: var(--ink-lighter);
            margin-top: 24px;
            line-height: 1.8;
            opacity: 0;
            animation: fadeInUp 1s ease 0.7s forwards;
        }
        .hero-cta {
            margin-top: 40px;
            display: flex;
            gap: 16px;
            justify-content: center;
            opacity: 0;
            animation: fadeInUp 1s ease 0.9s forwards;
        }
        .btn-primary {
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--red-light), var(--red-primary), var(--red-deep));
            color: white;
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 6px 25px var(--shadow-red), 0 0 20px rgba(218, 165, 32, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px var(--shadow-red), 0 0 30px var(--shadow-gold);
        }
        .btn-secondary {
            padding: 16px 40px;
            background: transparent;
            color: var(--gold-light);
            border: 2px solid var(--gold-primary);
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-secondary:hover {
            background: rgba(218, 165, 32, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px var(--shadow-gold);
        }
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeInUp 1s ease 1.2s forwards;
        }
        .scroll-indicator span {
            font-size: 12px;
            color: var(--ink-lighter);
            letter-spacing: 3px;
        }
        .scroll-arrow {
            width: 20px; height: 20px;
            border-right: 2px solid var(--gold-primary);
            border-bottom: 2px solid var(--gold-primary);
            transform: rotate(45deg);
            animation: bounce-arrow 2s ease infinite;
        }
        @keyframes bounce-arrow {
            0%, 100% { transform: rotate(45deg) translateY(0); opacity: 1; }
            50% { transform: rotate(45deg) translateY(8px); opacity: 0.5; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== Scrollbar ==================== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(196, 30, 58, 0.1); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--red-deep), var(--red-primary), var(--gold-light));
            border-radius: 4px;
            box-shadow: 0 0 8px var(--shadow-red);
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: linear-gradient(180deg, var(--red-primary), var(--gold-light));
            box-shadow: 0 0 12px var(--shadow-red), 0 0 8px var(--shadow-gold);
        }

        /* ==================== Responsive ==================== */
        @media (max-width: 1024px) {
            .overview-grid { grid-template-columns: repeat(2, 1fr); }
            .stories-grid { grid-template-columns: repeat(2, 1fr); }
            .timeline-events { grid-template-columns: 1fr; }
            .footer-content { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .nav-links { display: none; }
            .nav-toggle { display: flex; }
            .hero-title { font-size: 32px; letter-spacing: 3px; }
            .hero-subtitle { font-size: 13px; letter-spacing: 4px; }
            .hero-desc { font-size: 15px; }
            .hero-cta { flex-direction: column; align-items: center; }
            .section { padding: 60px 20px; }
            .section-title { font-size: 26px; }
            .overview-grid { grid-template-columns: 1fr; }
            .stories-grid { grid-template-columns: 1fr; }
            .map-toolbar { flex-direction: column; gap: 12px; }
            .search-box input { width: 100%; }
            .map-toolbar-right { width: 100%; justify-content: center; }
            #map-chart { height: 400px; }
            .modal { margin: 20px; }
            .modal-header { padding: 24px; }
            .modal-body { padding: 16px 24px 24px; }
            .modal-title { font-size: 24px; }
            .footer-content { grid-template-columns: 1fr; }
        }

        /* ==================== Animations ==================== */
        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .fade-in-delay-1 { transition-delay: 0.1s; }
        .fade-in-delay-2 { transition-delay: 0.2s; }
        .fade-in-delay-3 { transition-delay: 0.3s; }
        .fade-in-delay-4 { transition-delay: 0.4s; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar">
        <a href="#hero" class="nav-brand">
            <span class="star-icon">★</span>
            <span class="brand-text">红色印记·时空重构</span>
        </a>
    </nav>

    <!-- Hero Section -->
    <section id="hero">
        <div class="hero-bg"></div>
        <div class="hero-particles" id="particles"></div>
        <div class="hero-content">
            <div class="hero-subtitle">红色印记 · 时空重构</div>
            <h1 class="hero-title">
                404 您访问的页面不存在
            </h1>
            <div class="hero-cta">
                <a href="/" class="btn-primary">返回首页</a>
            </div>
        </div>
    </section>
</body>
</html>
